name: 发布到 PyPI

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        name: 构建分发包
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: 设置 Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: 安装构建工具
              run: python -m pip install --upgrade build

            - name: 构建包
              run: python -m build

            - name: 上传分发包
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/*

    publish:
        name: 发布到 PyPI
        needs: build
        runs-on: ubuntu-latest
        environment: pypi

        permissions:
            id-token: write

        steps:
            - name: 下载分发包
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist

            - name: 发布分发包到 PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
